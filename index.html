<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jozinites - Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: #333;
            position: relative;
            overflow-x: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        /* Floating Collage Background */
        .floating-collage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-img {
            position: absolute;
            opacity: 0.15;
            animation: float 20s infinite ease-in-out;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .floating-img:nth-child(1) { top: 5%; left: 5%; width: 120px; animation-delay: 0s; }
        .floating-img:nth-child(2) { top: 15%; right: 10%; width: 100px; animation-delay: 2s; }
        .floating-img:nth-child(3) { top: 25%; left: 8%; width: 90px; animation-delay: 4s; }
        .floating-img:nth-child(4) { top: 35%; right: 5%; width: 110px; animation-delay: 6s; }
        .floating-img:nth-child(5) { top: 45%; left: 3%; width: 95px; animation-delay: 8s; }
        .floating-img:nth-child(6) { top: 55%; right: 8%; width: 105px; animation-delay: 10s; }
        .floating-img:nth-child(7) { top: 65%; left: 10%; width: 85px; animation-delay: 12s; }
        .floating-img:nth-child(8) { top: 75%; right: 12%; width: 100px; animation-delay: 14s; }
        .floating-img:nth-child(9) { top: 85%; left: 5%; width: 90px; animation-delay: 16s; }
        .floating-img:nth-child(10) { top: 10%; left: 50%; width: 80px; animation-delay: 18s; }
        .floating-img:nth-child(11) { top: 60%; left: 45%; width: 75px; animation-delay: 5s; }
        .floating-img:nth-child(12) { top: 30%; left: 70%; width: 85px; animation-delay: 7s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            25% { transform: translateY(-20px) rotate(5deg) scale(1.05); }
            50% { transform: translateY(0) rotate(0deg) scale(1); }
            75% { transform: translateY(20px) rotate(-5deg) scale(0.95); }
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 680px;
            text-align: center;
            z-index: 1;
            position: relative;
        }

        /* Profile Section */
        .profile-section {
            margin-bottom: 30px;
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 5px solid #FFD700;
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 8px 32px rgba(255, 215, 0, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 32px rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 12px 40px rgba(255, 215, 0, 0.5); }
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            font-weight: 800;
            color: #FFD700;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 3px 3px 0px #4CAF50, -1px -1px 0 #4CAF50;
        }

        .bio {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #fff;
            opacity: 0.9;
            line-height: 1.6;
            font-weight: 500;
        }

        /* Links Container */
        .links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        /* Link Button Styling - Jozi Nites Style */
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 22px 30px;
            background: linear-gradient(135deg, #FFD700 0%, #FFC107 100%);
            color: #1a1a2e;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .link-btn:hover::before {
            left: 100%;
        }

        .link-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 35px rgba(255, 215, 0, 0.6);
            border-color: #4CAF50;
            background: linear-gradient(135deg, #FFC107 0%, #FFD700 100%);
        }

        .link-btn:active {
            transform: translateY(-2px) scale(0.98);
        }

        /* Icon Styling - Bigger */
        .link-btn i {
            font-size: 1.8rem;
            color: #4CAF50;
            transition: transform 0.3s;
        }

        .link-btn:hover i {
            transform: scale(1.2) rotate(10deg);
        }

        /* Special styling for different platforms */
        .link-btn.instagram { background: linear-gradient(135deg, #FFD700 0%, #ff6b6b 100%); }
        .link-btn.instagram i { color: #e1306c; }
        
        .link-btn.fetlife { 
            background: linear-gradient(135deg, #FFD700 0%, #ff4757 100%);
            border: 3px solid #e84118;
        }
        .link-btn.fetlife i { 
            color: #e84118;
            font-size: 2rem;
        }
        
        .link-btn.twitter { background: linear-gradient(135deg, #FFD700 0%, #74b9ff 100%); }
        .link-btn.twitter i { color: #1da1f2; }
        
        .link-btn.whatsapp { 
            background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
            color: white;
        }
        .link-btn.whatsapp i { 
            color: white;
            font-size: 2rem;
        }
        .link-btn.whatsapp:hover {
            border-color: #FFD700;
        }
        
        .link-btn.email { background: linear-gradient(135deg, #FFD700 0%, #a29bfe 100%); }
        .link-btn.email i { color: #6c5ce7; }

        /* FetLife Special Holder */
        .fetlife-holder {
            background: rgba(255, 71, 87, 0.1);
            border: 2px dashed #ff4757;
            border-radius: 20px;
            padding: 10px;
            margin: -10px -10px 10px -10px;
            position: relative;
        }

        .fetlife-holder::before {
            content: '🔞 ADULT CONTENT';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff4757;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* Social Icons Footer */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 30px;
        }

        .social-icons a {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFD700 0%, #4CAF50 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1a2e;
            font-size: 1.5rem;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        .social-icons a:hover {
            transform: translateY(-5px) rotate(360deg);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.5);
        }

        /* Responsive */
        @media (max-width: 480px) {
            h1 { font-size: 2rem; letter-spacing: 2px; }
            .link-btn { font-size: 1rem; padding: 18px 20px; }
            .link-btn i { font-size: 1.5rem; }
            .profile-img { width: 120px; height: 120px; }
            .floating-img { width: 60px !important; }
        }

        /* Loading Animation */
        .container > * {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .container > *:nth-child(1) { animation-delay: 0.1s; }
        .container > *:nth-child(2) { animation-delay: 0.2s; }
        .container > *:nth-child(3) { animation-delay: 0.3s; }
        .container > *:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- Floating Collage Background -->
    <div class="floating-collage">
        <img src="https://raw.githubusercontent.com/johnblackpipes-coder/links/main/assets/agony-aunt.png" class="floating-img" alt="Agony Aunt">
        <img src="https://raw.githubusercontent.com/johnblackpipes-coder/links/main/assets/academy.png" class="floating-img" alt="Academy">
        <img src="https://raw.githubusercontent.com/johnblackpipes-coder/links/main/assets/blok.png" class="floating-img" alt="Blok">

    </div>

    <script>
        // Add interactive hover effects
        document.querySelectorAll('.link-btn').forEach(btn => {
            btn.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-5px) scale(1.02)';
            });
            
            btn.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0) scale(1)';
            });
        });

        // Random floating animation speeds
        document.querySelectorAll('.floating-img').forEach((img, index) => {
            img.style.animationDuration = (15 + Math.random() * 10) + 's';
            img.style.animationDelay = (Math.random() * 5) + 's';
        });
    </script>
</body>
</html>
